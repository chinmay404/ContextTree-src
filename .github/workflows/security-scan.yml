name: Security Scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Scan tracked files for obvious secrets
        run: npm run security:scan
